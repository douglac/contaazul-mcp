name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/

      - name: Run gitleaks on working tree
        run: gitleaks detect --no-git --redact --verbose --report-format=sarif --report-path=results.sarif

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: results.sarif
          if-no-files-found: ignore

  custom-regex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for project-specific secrets
        run: |
          set +e
          FAIL=0

          echo "→ Checking for real toolkit tokens (tk_…)…"
          # placeholder pattern is tk_REPLACE_… or tk_xxx — block anything else with 16+ alnum chars
          hits=$(grep -rEn --exclude-dir=.github 'tk_[a-zA-Z0-9]{16,}' --include='*.md' --include='*.json' --include='*.yaml' --include='*.yml' . | grep -v 'tk_REPLACE' | grep -v 'tk_xxx' | grep -v 'tk_SEU_TOKEN' | grep -v 'tk_<' || true)
          if [ -n "$hits" ]; then echo "::error::Found real-looking tk_… tokens:"; echo "$hits"; FAIL=1; fi

          echo "→ Checking for real user IDs (usr_…)…"
          hits=$(grep -rEn --exclude-dir=.github 'usr_[a-zA-Z0-9_]{8,}' --include='*.md' --include='*.json' --include='*.yaml' --include='*.yml' . | grep -v 'usr_REPLACE' | grep -v 'usr_EXAMPLE' | grep -v 'usr_<' || true)
          if [ -n "$hits" ]; then echo "::error::Found real-looking usr_… ids:"; echo "$hits"; FAIL=1; fi

          echo "→ Checking for real JWTs (eyJ…)…"
          hits=$(grep -rEn --exclude-dir=.github 'eyJ[a-zA-Z0-9_-]{20,}\.[a-zA-Z0-9_-]{20,}\.' --include='*.md' --include='*.json' --include='*.yaml' --include='*.yml' . || true)
          if [ -n "$hits" ]; then echo "::error::Found real JWTs:"; echo "$hits"; FAIL=1; fi

          echo "→ Checking for Stripe / API keys / private PEMs…"
          hits=$(grep -rEn --exclude-dir=.github 'sk_live_[a-zA-Z0-9]{16,}|sk_test_[a-zA-Z0-9]{16,}|wak_[a-zA-Z0-9]{12,}|mlk_[a-f0-9]{16,}|lbp_[a-f0-9]{16,}|BEGIN (RSA |EC )?PRIVATE KEY' . || true)
          if [ -n "$hits" ]; then echo "::error::Found credential pattern:"; echo "$hits"; FAIL=1; fi

          echo "→ Checking for env var assignments that look real…"
          hits=$(grep -rEn --exclude-dir=.github '(MONGODB_URI|PROVIDER_ENCRYPTION_KEY|OAUTH_JWT_PRIVATE_KEY_PEM|STRIPE_BR_SECRET_KEY|CLIENT_SECRET)\s*=\s*[^<].{8,}' --include='*.md' --include='*.json' --include='*.yaml' --include='*.yml' . || true)
          if [ -n "$hits" ]; then echo "::error::Found env-var assignment that looks real:"; echo "$hits"; FAIL=1; fi

          if [ $FAIL -eq 1 ]; then
            echo ""
            echo "❌ Secret scan failed. Use placeholders only (tk_REPLACE, usr_<…>, <SEU_TOKEN_AQUI>)."
            exit 1
          fi
          echo "✓ No project-specific secrets found"
